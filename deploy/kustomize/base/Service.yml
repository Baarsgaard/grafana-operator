---
# Source: grafana-operator/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: manager-grafana-operator-metrics-service
  namespace: default
  labels:
    app.kubernetes.io/name: grafana-operator
    app.kubernetes.io/instance: manager
    app.kubernetes.io/version: "v5.13.0"
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
    - port: 8888
      targetPort: pprof
      protocol: TCP
      name: pprof
  selector:
    app.kubernetes.io/name: grafana-operator
    app.kubernetes.io/instance: manager
